name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: install (zero runtime deps; pytest only)
        run: python -m pip install -e ".[test]"
      - name: test (hermetic — no network, no GPU, no model)
        run: python -m pytest -q

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: build the wheel
        run: |
          python -m pip install build
          python -m build
      - name: install the wheel in a clean venv and run the packaged CLI
        run: |
          python -m venv /tmp/vc
          /tmp/vc/bin/pip install dist/*.whl
          /tmp/vc/bin/relay --help > /dev/null
